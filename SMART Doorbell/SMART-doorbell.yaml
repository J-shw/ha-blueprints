blueprint:
  name: SMART Doorbell
  description: >
    <h3><b>🔔 The Ultimate SMART Doorbell Controller</b></h3>
    <h4>Version: 1.0</h4>

    <p>Most "smart" doorbells aren't actually that smart.. They just ping your phone and call it a day. This blueprint turns your basic doorbell press into an event based on your rules, your schedule, and who is actually home.</p>

    <h4><b>🛠️ What This Blueprint Can Do:</b></h4>
    <ul>
      <li><b>📱 Rich Mobile Alerts:</b> Send instant notifications to your phone, complete with live snapshot images from your doorbell camera.</li>
      <li><b>🔊 Intelligent Audio Control:</b> Automatically pause your music/movies or temporarily duck the volume on your media players so you never miss a knock.</li>
      <li><b>🗣️ Voice Announcements:</b> Broadcast custom Text-to-Speech (TTS) messages across your smart speakers (e.g., <i>"Someone is at the front door"</i>).</li>
      <li><b>💡 Visual Notifications:</b> Flash your living room, office, or patio lights. Perfect for accessibility, late-night gaming with headphones, or keeping the house quiet.</li>
      <li><b>⏰ Time & Day Filters:</b> Restrict alerts to specific hours or days (e.g., disable speaker announcements late at night).</li>
      <li><b>👥 Presence Awareness:</b> Only trigger actions if designated people are actually home.</li>
    </ul>

    <hr>
    <p><small><i><b>🚀 Quick Start:</b> Link your doorbell's <b>Trigger Binary Sensor</b> below, collapse the menus you don't need, and customise your ultimate notification setup!</i></small></p>
  domain: automation
  author: "https://github.com/J-shw/ha-blueprints"
  homeassistant:
    min_version: 2024.6.0
  input:
    trigger_settings:
      name: "Trigger Settings *"
      icon: mdi:bell-ring-outline
      description: Select the trigger settings for the doorbell automation.
      input:

        doorbell_binary_sensor:
          name: Doorbell Binary Sensor
          description: The binary sensor that detects when the doorbell is pressed.
          selector:
            entity:
              filter:
                - domain: binary_sensor
        
        doorbell_image_entity:
          name: Doorbell Image Entity (Optional)
          description: The camera entity that provides an image of the doorbell when triggered.
          default:
          selector:
            entity:
              filter:
                - domain: camera
    
    notification_settings:
      name: Notification Settings
      icon: mdi:bell-outline
      description: Configure notification settings for the doorbell automation.
      collapsed: true
      input:
        notify_enabled:
          name: Enable Notifications
          description: Enable or disable notifications when the doorbell is triggered.
          default: false
          selector:
            boolean:
        notify_with_doorbell_image:
          name: Include Doorbell Image in Notification
          description: Include an image from the doorbell camera in the notification.
          default: false
          selector:
            boolean:
        notify_title:
          name: Notification Title
          description: The title of the notification to be sent when the doorbell is triggered.
          default: "Doorbell Alert"
          selector:
            text:
        notify_message:
          name: Notification Message
          description: The message to be sent when the doorbell is triggered.
          default: "Someone is at the door."
          selector:
            text:
        
        notify_click_action:
          name: Notification Click Action
          description: The dashboard to navigate to when the notification is clicked.
          default: '/overview'
          selector:
            text:

        notify_mobile_device:
          name: Notification Target 1 (Mobile Device)
          description: The mobile device to send the notification to.
          default:
          selector:
            device:
              integration: mobile_app
        
        notify_mobile_device_type:
          name: Notification Target 1 Device Type
          description: Select the mobile device type to send the notification to.
          default: android
          selector:
            select:
              options:
                - label: Android
                  value: "android"
                - label: iOS
                  value: "ios"

        notify_mobile_device_2:
          name: Notification Target 2 (Mobile Device)
          description: The mobile device to send the notification to.
          default:
          selector:
            device:
              integration: mobile_app
        
        notify_mobile_device_2_type:
          name: Notification Target 2 Device Type
          description: Select the mobile device type to send the notification to.
          default: android
          selector:
            select:
              options:
                - label: Android
                  value: "android"
                - label: iOS
                  value: "ios"

    light_settings:
      name: Lights
      icon: mdi:lightbulb-outline
      description: Select the lights to flash when the doorbell is triggered.
      collapsed: true
      input:
        target_light:
          name: Lights
          description: The lights to flash when the doorbell is triggered.
          default: {}
          selector:
            target:
              entity:
                - domain: light
        light_flash_count:
          name: Light Flash Count
          description: The number of times the lights should flash when the doorbell is triggered.
          default: 4
          selector:
            number:
              min: 2
              max: 10
              step: 2
        light_flash_on_duration_seconds:
          name: Light Flash On Duration
          description: The duration of the on period between light flash in seconds.
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 5
              step: 0.1
        light_flash_off_duration_seconds:
          name: Light Flash Off Duration
          description: The duration of the off period between light flashes in seconds.
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 5
              step: 0.1
    
    media_player_settings:
      name: Media Player Settings
      icon: mdi:speaker-multiple
      description: Select the media players to pause or reduce volume when the doorbell is triggered.
      collapsed: true
      input:
        target_media_player_pause:
          name: Media Players (Pause)
          description: The media players to pause when the doorbell is triggered.
          default: {}
          selector:
            target:
              entity:
                - domain: media_player
        
        target_media_player_volume:
          name: Media Players (Volume)
          description: The media players to reduce volume when the doorbell is triggered.
          default: {}
          selector:
            target:
              entity:
                - domain: media_player
        
        percentage_volume_reduction_steps:
          name: Volume Reduction Steps
          description: The number of steps to reduce the volume of the media players when the doorbell is triggered. (A step might be 1 or more depending on speakers.. Please start small and test!)
          default: 5
          selector:
            number:
              min: 0
              max: 100
              step: 5
        
        duration_volume_reduction_seconds:
          name: Duration of Volume Reduction
          description: The duration in seconds to keep the volume reduced before restoring it.
          default: 5
          selector:
            number:
              min: 1
              max: 60
              step: 1
    
    tts_settings:
      name: TTS Settings
      icon: mdi:account-voice
      description: Configure text-to-speech settings for the doorbell automation.
      collapsed: true
      input:
        tts_enabled:
          name: Enable TTS
          description: Enable or disable text-to-speech notifications.
          default: false
          selector:
            boolean:
        tts_engine:
          name: TTS Engine
          description: The TTS engine to use for generating speech.
          default: {}
          selector:
            entity:
              domain: tts
        tts_message:
          name: TTS Message
          description: The message to be spoken when the doorbell is triggered.
          default: "Someone is at the door."
          selector:
            text:
        tts_target_speaker:
          name: TTS Target Speaker
          description: The speaker to play the TTS message on.
          default: {}
          selector:
            entity:
              domain: media_player

    time_settings:
      name: "Time Settings"
      icon: mdi:clock-outline
      description: Select the time-related settings for when the automation should run.
      collapsed: true
      input:
        after_time:
          name: After Time
          description: The time after which the automation can run.
          default: "00:00:00"
          selector:
            time:
        
        before_time:
          name: Before Time
          description: The time before which the automation can run.
          default: "23:59:59"
          selector:
            time:
        
        day_of_week:
          name: Day of Week
          description: The days of the week on which the automation can run.
          default:
            - mon
            - tue
            - wed
            - thu
            - fri
            - sat
            - sun
          selector:
            select:
              multiple: true
              mode: list
              options:
                - value: mon
                  label: Monday
                - value: tue
                  label: Tuesday
                - value: wed
                  label: Wednesday
                - value: thu
                  label: Thursday
                - value: fri
                  label: Friday
                - value: sat
                  label: Saturday
                - value: sun
                  label: Sunday
  
    presence_settings:
      name: "Presence Settings"
      icon: mdi:account-check-outline
      description: Configure presence detection settings for the doorbell automation. 
      collapsed: true
      input:
        people_to_check:
          name: People to Check
          description: Select the people to check for presence before triggering the automation.
          default: {}
          selector:
            target:
              entity:
                - domain: person

variables:
  doorbell_binary_sensor: !input doorbell_binary_sensor
  doorbell_image_entity: !input doorbell_image_entity

  people_to_check: !input people_to_check

  after_time: !input after_time
  before_time: !input before_time
  day_of_week: !input day_of_week

  light_flash_count: !input light_flash_count
  light_flash_on_duration_seconds: !input light_flash_on_duration_seconds
  light_flash_off_duration_seconds: !input light_flash_off_duration_seconds
  target_light: !input target_light

  target_media_player_pause: !input target_media_player_pause
  target_media_player_volume: !input target_media_player_volume
  percentage_volume_reduction_steps: !input percentage_volume_reduction_steps
  duration_volume_reduction_seconds: !input duration_volume_reduction_seconds

  tts_enabled: !input tts_enabled
  tts_engine: !input tts_engine
  tts_message: !input tts_message
  tts_target_speaker: !input tts_target_speaker

  notify_enabled: !input notify_enabled
  notify_with_doorbell_image: !input notify_with_doorbell_image
  notify_title: !input notify_title
  notify_message: !input notify_message
  notify_click_action: !input notify_click_action
  notify_mobile_device: !input notify_mobile_device
  notify_mobile_device_type: !input notify_mobile_device_type
  notify_mobile_device_2: !input notify_mobile_device_2
  notify_mobile_device_2_type: !input notify_mobile_device_2_type

  snapshot_create_file_path: /config/www/tmp/snapshot_{{ states[doorbell_image_entity].object_id }}.jpg


triggers:
  - platform: state
    entity_id: !input doorbell_binary_sensor
    from: "off"
    to: "on"
    id: use_binary

conditions:
  - condition: time
    after: !input after_time
    before: !input before_time
    weekday: !input day_of_week
  
  - condition: template
    value_template: >
      {% set target = people_to_check %}
      {% set entity_ids = target.get('entity_id', []) if target is mapping else target %}
      {% set entity_ids = [entity_ids] if entity_ids is string else entity_ids %}
      
      {% if entity_ids == none or entity_ids == [] or entity_ids == [''] %}
        true
      {% else %}
        {{ states.person | selectattr('entity_id', 'in', entity_ids) | selectattr('state', 'eq', 'home') | list | length > 0 }}
      {% endif %}
      
action:
  - if:
      - condition: template
        value_template: "{{ notify_with_doorbell_image and doorbell_image_entity != None }}"
    then:
      - service: camera.snapshot
        entity_id: !input doorbell_image_entity
        data:
          filename: "{{ snapshot_create_file_path }}"
  - parallel:
    - if:
        - condition: template
          value_template: "{{ notify_enabled and notify_mobile_device != None }}"
      then:
        - device_id: !input notify_mobile_device
          domain: mobile_app
          type: notify
          title: !input notify_title
          message: !input notify_message
          data: >
            {% set base_data = {"clickAction": notify_click_action} %}
            {% if notify_with_doorbell_image and doorbell_image_entity != {} %}
              {% if notify_mobile_device_type == 'android' %}
                {% set android_data = dict(base_data, image=snapshot_access_file_path) %}
                {{ android_data }}
              {% else %}
                {% set ios_attachment = {"attachment": {"url": snapshot_access_file_path, "content-type": "jpeg"}} %}
                {% set ios_data = dict(base_data, **ios_attachment) %}
                {{ ios_data }}
              {% endif %}
            {% else %}
              {{ base_data }}
            {% endif %}
    
    - if:
        - condition: template
          value_template: "{{ notify_enabled and notify_mobile_device_2 != None }}"
      then:
        - device_id: !input notify_mobile_device_2
          domain: mobile_app
          type: notify
          title: !input notify_title
          message: !input notify_message
          data: >
            {% set base_data = {"clickAction": notify_click_action} %}
            {% if notify_with_doorbell_image and doorbell_image_entity != {} %}
              {% if notify_mobile_device_type == 'android' %}
                {% set android_data = dict(base_data, image=snapshot_access_file_path) %}
                {{ android_data }}
              {% else %}
                {% set ios_attachment = {"attachment": {"url": snapshot_access_file_path, "content-type": "jpeg"}} %}
                {% set ios_data = dict(base_data, **ios_attachment) %}
                {{ ios_data }}
              {% endif %}
            {% else %}
              {{ base_data }}
            {% endif %}

    - if:
        - condition: template
          value_template: "{{ target_light != {} and target_light.entity_id is defined }}"
      then:
        - variables:
            light_entities: >
              {% if target_light.entity_id is string %}
                {{ [target_light.entity_id] }}
              {% else %}
                {{ target_light.entity_id }}
              {% endif %}
            initial_states: >
              {% set ns = namespace(states=[]) %}
              {% for light in light_entities %}
                {% set ns.states = ns.states + [{'entity_id': light, 'state': states(light)}] %}
              {% endfor %}
              {{ ns.states }}

        - action: light.turn_off
          target: !input target_light
        - repeat:
            count: !input light_flash_count
            sequence:
              - action: light.turn_on
                target: !input target_light
              - delay:
                  seconds: !input light_flash_on_duration_seconds
              - action: light.turn_off
                target: !input target_light
              - delay:
                  seconds: !input light_flash_off_duration_seconds

        - repeat:
            for_each: "{{ initial_states }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ repeat.item.state == 'on' }}"
                then:
                  - action: light.turn_on
                    target:
                      entity_id: "{{ repeat.item.entity_id }}"
                else:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ repeat.item.entity_id }}"

    - if:
        - condition: template
          value_template: "{{ target_media_player_pause != {} }}"
      then:
        - action: media_player.media_pause
          target: !input target_media_player_pause

    - if:
        - condition: template
          value_template: "{{ target_media_player_volume != {} and target_media_player_volume.entity_id is defined }}"
      then:
        - repeat:
            for_each: >
              {% if target_media_player_volume.entity_id is string %}
                {{ [target_media_player_volume.entity_id] }}
              {% else %}
                {{ target_media_player_volume.entity_id }}
              {% endif %}
            sequence:
              - variables:
                  repeat_item: "{{ repeat.item }}"
              - if:
                  - condition: template
                    value_template: "{{ states(repeat_item) in ['on', 'playing'] and state_attr(repeat_item, 'volume_level') | float(0) > 0 }}"
                then:
                  - repeat:
                      count: !input percentage_volume_reduction_steps
                      sequence:
                        - action: media_player.volume_down
                          target:
                            entity_id: "{{ repeat_item }}"
                      
                  - delay:
                      seconds: !input duration_volume_reduction_seconds
                          
                  - repeat:
                      count: !input percentage_volume_reduction_steps
                      sequence:
                        - action: media_player.volume_up
                          target:
                            entity_id: "{{ repeat_item }}"
    
    - if:
        - condition: template
          value_template: "{{ tts_enabled and tts_engine != {} and tts_target_speaker != {} }}"
      then:
        - action: tts.speak
          target:
            entity_id: !input tts_engine
          data:
            media_player_entity_id: !input tts_target_speaker
            message: !input tts_message